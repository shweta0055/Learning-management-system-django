server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript application/x-javascript
               image/svg+xml font/woff font/woff2;

    # ── Static assets — cache aggressively ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # IMPORTANT: still fall back to index.html if file not found
        try_files $uri =404;
    }

    # ── ALL other routes → serve index.html (React Router handles the rest) ──
    location / {
        try_files $uri $uri/ /index.html =200;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Disable caching for index.html specifically ───────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
