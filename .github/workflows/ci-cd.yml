name: LMS CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/lms

jobs:
  # ─── Django Tests ──────────────────────────────────────────────────────────
  test-django:
    name: Django Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: lms_test
          MYSQL_USER: lms_user
          MYSQL_PASSWORD: lms_password
          MYSQL_ROOT_PASSWORD: root_password
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u lms_user -plms_password"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 30s
        ports:
          - 3306:3306

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/django_app/requirements.txt

      - name: Install system dependencies for mysqlclient
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config gcc

      - name: Install Python dependencies
        run: |
          cd backend/django_app
          pip install -r requirements.txt

      - name: Wait for MySQL to be fully ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u lms_user -plms_password --silent 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... attempt $i"
            sleep 3
          done

      - name: Grant MySQL permissions for Django CI user
        run: |
          mysql -h 127.0.0.1 -u root -proot_password -e "CREATE USER IF NOT EXISTS 'lms_user'@'%' IDENTIFIED BY 'lms_password'; ALTER USER 'lms_user'@'%' IDENTIFIED BY 'lms_password'; GRANT ALL PRIVILEGES ON *.* TO 'lms_user'@'%' WITH GRANT OPTION; FLUSH PRIVILEGES;"

      - name: Run migrations & tests
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production-at-least-50-chars-long
          DB_NAME: lms_test
          DB_USER: lms_user
          DB_PASSWORD: lms_password
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          REDIS_URL: redis://localhost:6379/0
          DEBUG: 'True'
          ALLOWED_HOSTS: '*'
          CELERY_TASK_ALWAYS_EAGER: 'True'
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          USE_S3: 'False'
          EMAIL_HOST_USER: ''
          EMAIL_HOST_PASSWORD: ''
        run: |
          cd backend/django_app
          python manage.py migrate --noinput
          python -m pytest tests/ --tb=short -q

  # ─── FastAPI Tests ─────────────────────────────────────────────────────────
  test-fastapi:
    name: FastAPI Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/fastapi_service/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config gcc

      - name: Install Python dependencies
        run: |
          cd backend/fastapi_service
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: mysql+aiomysql://lms_user:lms_password@127.0.0.1:3306/lms_test
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production-at-least-50-chars
        run: |
          cd backend/fastapi_service
          python -m pytest tests/ --tb=short -q

  # ─── Frontend Build & Tests ────────────────────────────────────────────────
  test-frontend:
    name: React Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # No cache since there's no package-lock.json

      - name: Install dependencies
        run: |
          cd frontend/react_app
          npm install --legacy-peer-deps

      - name: Build
        run: |
          cd frontend/react_app
          npm run build
        env:
          REACT_APP_DJANGO_API_URL: http://localhost:8000
          REACT_APP_FASTAPI_URL: http://localhost:8001
          CI: 'false'
          GENERATE_SOURCEMAP: 'false'

  # ─── Docker Build & Push ───────────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-django, test-fastapi, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Django image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/django_app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-django:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/fastapi_service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-fastapi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/react_app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          build-args: |
            REACT_APP_DJANGO_API_URL=${{ secrets.DJANGO_API_URL }}
            REACT_APP_FASTAPI_URL=${{ secrets.FASTAPI_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

