name: LMS Docker CI/CD

on:
  push:
    branches: [main]

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clean Docker
        run: |
          docker compose down -v || true
          docker system prune -af || true

      - name: Build & Start Containers
        run: docker compose up -d --build

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            docker exec $(docker ps -qf "name=db") mysqladmin ping -h "localhost" -uroot -plms_root_password && break
            sleep 5
          done

      - name: Run Migrations
        run: |
          docker exec $(docker ps -qf "name=django") python manage.py migrate

      - name: Run Django Tests
        run: |
          docker exec $(docker ps -qf "name=django") pytest

      - name: Check APIs
        run: |
          curl -f http://localhost:8000/api/schema/ || exit 1
          curl -f http://localhost:8001/docs || exit 1

      - name: Check Frontend
        run: |
          curl -f http://localhost:3000 || exit 1

      - name: Logs (if failed)
        if: failure()
        run: docker compose logs

      - name: Stop Containers
        if: always()
        run: docker compose down